name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # segauge is resolved from its git repository (see tool.uv.sources), so no
      # sibling checkout is needed.
      - name: Sync
        run: uv sync --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
      - name: Verify published stats reproduce from per-case scores
        run: |
          uv run segbench reanalyze --results results/kits23_modal.json
          uv run segbench reanalyze --results results/kits23_seed.json
